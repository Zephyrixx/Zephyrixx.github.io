<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zephyrix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Zephyrix</a>
    <ul class="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="code.html">代码</a></li>
      <li><a href="articles.html">文章</a></li>
    </ul>
    <button class="theme-toggle" id="theme-toggle">切换模式</button>
  </nav>

  <div class="container">
    <div class="profile">
      <img src="avatar.png" alt="Avatar" class="avatar">
      <h1>Zephyrix</h1>
      <p class="bio">我也会奢望，你和我的故事在这个尽头里重生——直到完美的结局。或许并没有完美的结局。</p>
      <div class="btn-group">
        <a href="code.html" class="button">我的代码</a>
        <a href="articles.html" class="button">文章列表</a>
      </div>
    </div>
  </div>

  <footer>&copy; 2026 Zephyrix</footer>

  <script>
    const btn = document.getElementById('theme-toggle');
    btn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  </script>
</body>
</html>
