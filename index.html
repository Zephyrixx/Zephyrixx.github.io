<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zephyrix 的个人主页</title>
  <!-- 先加载simple.css，再加载你的自定义style.css，保证你的样式优先级更高 -->
  <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- 导航栏必须放在最顶部，结构正确 -->
  <nav>
    <div class="nav-container">
      <a href="index.html" class="logo">Zephyrix</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="code.html">代码</a></li>
        <li><a href="articles.html">文章</a></li>
      </ul>
      <button id="theme-toggle">暗黑模式</button>
    </div>
  </nav>

  <div class="container">
    <div class="profile">
      <!-- 用你自己的头像，替换这个链接 -->
      <img src="https://picsum.photos/seed/zephyrix/120/120" alt="头像" class="avatar">
      <h1>Zephyrix</h1>
      <p class="bio">一名热爱编程、爬虫与嵌入式开发的学习者</p>
      <div class="social">
        <a href="https://github.com/Zephyrixx" target="_blank">GitHub</a>
      </div>
    </div>

    <div class="nav-buttons">
      <a href="code.html" class="button">我的代码</a>
      <a href="articles.html" class="button">文章列表</a>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Zephyrix | 个人主页</p>
  </footer>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });

    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
