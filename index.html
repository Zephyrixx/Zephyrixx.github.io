<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zephyrix 的个人主页</title>
  <!-- 先引入第三方样式 -->
  <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
  <!-- 最后引入你的样式，保证优先级最高 -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav>
    <div class="nav-container">
      <a href="index.html" class="logo">Zephyrix</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="code.html">代码</a></li>
        <li><a href="articles.html">文章</a></li>
      </ul>
      <button id="theme-toggle" class="theme-btn">暗黑模式</button>
    </div>
  </nav>

  <div class="container">
    <div class="profile">
      <!-- 头像：这里的链接已经是你要的小猫图片 -->
      <img src="https://i.imgur.com/7dLtRjB.png" alt="Zephyrix" class="avatar">
      
      <h1>Zephyrix</h1>
      
      <!-- 天青色文字：这里加了 !important 强制生效 -->
      <p class="bio" id="special-bio">
        我也会奢望，你和我的故事······在这个尽头里重生--直到完美的结局.......或许并没有完美的结局。
      </p>
      
      <div class="social">
        <a href="https://github.com/Zephyrixx" target="_blank">GitHub</a>
      </div>
    </div>

    <div class="nav-buttons">
      <a href="code.html" class="button">我的代码</a>
      <a href="articles.html" class="button">文章列表</a>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Zephyrix | 个人主页</p>
  </footer>

  <script>
    // 暗黑模式逻辑
    const toggleBtn = document.getElementById('theme-toggle');
    const body = document.body;
    
    // 检查本地存储
    if (localStorage.getItem('theme') === 'dark') {
      body.classList.add('dark');
    }

    toggleBtn.addEventListener('click', () => {
      body.classList.toggle('dark');
      localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
    });
  </script>
</body>
</html>
