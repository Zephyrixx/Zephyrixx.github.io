<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zephyrix 的个人主页</title>
  <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav>
    <div class="nav-container">
      <a href="index.html" class="logo">Zephyrix</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="code.html">代码</a></li>
        <li><a href="articles.html">文章</a></li>
      </ul>
      <button id="theme-toggle">暗黑模式</button>
    </div>
  </nav>

  <div class="container">
    <div class="profile">
      <img src="https://i.imgur.com/9avfXaJ.png" alt="头像" class="avatar" style="width:130px;height:130px;border-radius:50%;object-fit:cover;">
      <h1>Zephyrix</h1>
      
      <p class="bio" style="color: #4ECDC4; font-size: 1.15rem; font-weight:500;">
        我也会奢望，你和我的故事······在这个尽头里重生--直到完美的结局.......或许并没有完美的结局。
      </p>
      
      <div class="social">
        <a href="https://github.com/Zephyrixx" target="_blank">GitHub</a>
      </div>
    </div>

    <div class="nav-buttons">
      <a href="code.html" class="button">我的代码</a>
      <a href="articles.html" class="button">文章列表</a>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Zephyrix | 个人主页</p>
  </footer>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
