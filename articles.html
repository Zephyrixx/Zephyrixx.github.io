<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章列表 | Zephyrix</title>
  <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body id="page-body">
  <nav>
    <div class="nav-container">
      <a href="index.html" class="logo">Zephyrix</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="code.html">代码</a></li>
        <li><a href="articles.html">文章</a></li>
      </ul>
      <button id="theme-toggle" class="theme-btn">切换模式</button>
    </div>
  </nav>

  <div class="container">
    <div class="article-section">
      <!-- 文章收藏 -->
      <div class="article-card" onclick="toggleContent('article-detail')">
        <h2>文章收藏</h2>
        <div id="article-detail" class="content-detail">
          <p>• Git & GitHub 完全使用指南</p>
          <p>• C 语言指针与内存管理</p>
          <p>• Python 爬虫基础与反爬</p>
          <p>• Linux 环境与 Docker 入门</p>
        </div>
      </div>

      <!-- 学习笔记 -->
      <div class="article-card" onclick="toggleContent('note-detail')">
        <h2>学习笔记</h2>
        <div id="note-detail" class="content-detail">
          <p>• 数据结构与算法笔记</p>
          <p>• 操作系统基础总结</p>
          <p>• 计算机网络知识点</p>
          <p>• 嵌入式开发入门</p>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Zephyrix</p>
  </footer>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const body = document.getElementById('page-body');
    
    if (localStorage.getItem('theme') === 'dark') {
      body.classList.add('dark');
    }

    toggleBtn.addEventListener('click', () => {
      body.classList.toggle('dark');
      localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
    });

    function toggleContent(id) {
      const el = document.getElementById(id);
      el.classList.toggle('show');
    }
  </script>
</body>
</html>
