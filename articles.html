<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 - Zephyrix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Zephyrix</a>
    <ul class="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="code.html">代码</a></li>
      <li><a href="articles.html">文章</a></li>
    </ul>
    <button class="theme-toggle" id="theme-toggle">切换模式</button>
  </nav>

  <div class="container">
    <div class="card" onclick="toggle('a1')">
      <h2>文章收藏</h2>
      <div class="detail" id="a1">
        <p>• Git & GitHub 完全指南</p>
        <p>• C 语言指针与内存</p>
        <p>• Python 爬虫基础</p>
        <p>• Linux 与 Docker 入门</p>
      </div>
    </div>

    <div class="card" onclick="toggle('a2')">
      <h2>学习笔记</h2>
      <div class="detail" id="a2">
        <p>• 数据结构与算法</p>
        <p>• 操作系统基础</p>
        <p>• 计算机网络总结</p>
        <p>• 嵌入式开发笔记</p>
      </div>
    </div>
  </div>

  <footer>&copy; 2026 Zephyrix</footer>

  <script>
    const btn = document.getElementById('theme-toggle');
    btn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');

    function toggle(id) {
      document.getElementById(id).classList.toggle('show');
    }
  </script>
</body>
</html>
