<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body id="page-body">
  <nav>
    <div class="nav-container">
      <a href="index.html" class="logo">Zephyrix</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="code.html">代码</a></li>
        <li><a href="articles.html">文章</a></li>
      </ul>
      <button id="theme-toggle" class="theme-btn">切换模式</button>
    </div>
  </nav>

  <div class="container">
    <div class="card" onclick="toggle('code1')">
      <h2>我的代码项目</h2>
      <div class="detail" id="code1">
        <p>• Python 爬虫</p>
        <p>• 数据处理工具</p>
        <p>• 自动化脚本</p>
      </div>
    </div>

    <div class="card" onclick="toggle('code2')">
      <h2>Python 爬虫</h2>

        <p>• 网页抓取</p>

  <footer>
    <p>&copy; 2026 Zephyrix</p>
  </footer>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const body = document.getElementById('page-body');
    
    if (localStorage.getItem('theme') === 'dark') {
      body.classList.add('dark');
    }

    toggleBtn.addEventListener('click', () => {
      body.classList.toggle('dark');
      localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
    });

    function toggle(id) {
      document.getElementById(id).classList.toggle('show');
    }
  </script>
</body>
</html>
