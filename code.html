<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的代码 | Zephyrix</title>
  <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body id="page-body">
  <nav>
    <div class="nav-container">
      <a href="index.html" class="logo">Zephyrix</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="code.html">代码</a></li>
        <li><a href="articles.html">文章</a></li>
      </ul>
      <button id="theme-toggle" class="theme-btn">切换模式</button>
    </div>
  </nav>

  <div class="container">
    <div class="content-card" onclick="toggleContent('code-detail')">
      <h1>我的代码项目</h1>
      <div id="code-detail" class="content-detail">
        <h3>🐍 Python 爬虫</h3>
        <p>• 网页数据抓取工具</p>
        <p>• 批量下载文章 / 图片</p>
        <p>• 接口请求与数据解析</p>
        <p>• 反爬处理实践</p>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Zephyrix</p>
  </footer>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const body = document.getElementById('page-body');
    
    if (localStorage.getItem('theme') === 'dark') {
      body.classList.add('dark');
    }

    toggleBtn.addEventListener('click', () => {
      body.classList.toggle('dark');
      localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
    });

    // 点击展开/收起内容
    function toggleContent(id) {
      const el = document.getElementById(id);
      el.classList.toggle('show');
    }
  </script>
</body>
</html>
