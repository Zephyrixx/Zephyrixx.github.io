<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My 3D Portfolio</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      
      /* Game UI Base Styles */
      .game-ui {
        position: fixed;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        z-index: 1000;
      }
      
      /* Main Control Panel */
      .control-panel {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.8);
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        min-width: 250px;
        max-width: 300px;
        transition: all 0.3s ease;
      }
      
      .panel-header {
        padding: 15px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .panel-header h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
      }
      
      .panel-toggle {
        background: none;
        border: none;
        color: white;
        font-size: 18px;
        cursor: pointer;
        padding: 0;
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .panel-content {
        padding: 20px;
        max-height: 400px;
        overflow-y: auto;
        transition: all 0.3s ease;
      }
      
      .panel-content.collapsed {
        max-height: 0;
        padding: 0 20px;
        overflow: hidden;
      }
      
      /* Control Items */
      .control-item {
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
      }
      
      .control-item label {
        font-size: 13px;
        margin-bottom: 5px;
        color: #ddd;
        font-weight: 500;
      }
      
      .control-item input[type="range"] {
        width: 100%;
        margin: 5px 0;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        height: 6px;
        -webkit-appearance: none;
        appearance: none;
      }
      
      .control-item input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        background: #4CAF50;
        border-radius: 50%;
        cursor: pointer;
      }
      
      .control-item input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        background: #4CAF50;
        border-radius: 50%;
        cursor: pointer;
        border: none;
      }
      
      .control-item button {
        background: linear-gradient(135deg, #4CAF50, #45a049);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.3s ease;
        margin-top: 5px;
      }
      
      .control-item button:hover {
        background: linear-gradient(135deg, #45a049, #3e8e41);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
      }
      
      .control-item button:active {
        transform: translateY(0);
      }
      
      /* Select elements */
      .control-select {
        width: 100%;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        color: white;
        font-size: 13px;
        font-weight: 500;
        margin-top: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      
      .control-select:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.3);
      }
      
      .control-select option {
        background: #333;
        color: white;
      }
      
      /* Settings Tabs */
      .settings-tabs {
        display: flex;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        margin: 0 20px;
      }
      
      .tab-button {
        background: none;
        border: none;
        color: #aaa;
        padding: 10px 15px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.3s ease;
        border-bottom: 2px solid transparent;
      }
      
      .tab-button.active {
        color: white;
        border-bottom-color: #4CAF50;
      }
      
      .tab-content {
        display: none;
      }
      
      .tab-content.active {
        display: block;
      }
      
      /* Info Panel */
      #info-panel {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.9);
        color: white;
        padding: 30px;
        border-radius: 15px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        z-index: 1000;
        min-width: 300px;
        max-width: 600px;
        display: none;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
      }
      
      #info-panel h2 {
        margin: 0 0 20px 0;
        font-size: 24px;
        font-weight: 600;
      }
      
      #info-panel p {
        margin: 0 0 25px 0;
        line-height: 1.6;
        font-size: 16px;
        color: #ddd;
      }
      
      #info-panel .button-group {
        display: flex;
        gap: 10px;
      }
      
      #info-panel button {
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s ease;
      }
      
      #info-panel .primary-button {
        background: linear-gradient(135deg, #4CAF50, #45a049);
        color: white;
      }
      
      #info-panel .secondary-button {
        background: rgba(255, 255, 255, 0.2);
        color: white;
      }
      
      #info-panel .close-button {
        position: absolute;
        top: 15px;
        right: 20px;
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
        padding: 0;
        line-height: 1;
      }
      
      /* Map */
      #map {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 300px;
        height: 300px;
        background: rgba(0, 0, 0, 0.8);
        border-radius: 12px;
        z-index: 1000;
        display: none;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 15px;
        transition: all 0.3s ease;
      }
      
      #map .map-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }
      
      #map h3 {
        margin: 0;
        color: white;
        font-size: 16px;
        font-weight: 600;
      }
      
      #map .close-button {
        background: none;
        border: none;
        color: white;
        font-size: 18px;
        cursor: pointer;
        padding: 0;
      }
      
      #map-content {
        width: 100%;
        height: calc(100% - 40px);
        position: relative;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        overflow: hidden;
      }
      
      #map-vehicle {
        position: absolute;
        width: 12px;
        height: 12px;
        background: #ff0000;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
        box-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
      }
      
      #map-pois {
        position: absolute;
        width: 100%;
        height: 100%;
      }
      
      /* HUD Elements */
      .hud {
        position: fixed;
        top: 20px;
        left: 20px;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        z-index: 1000;
      }
      
      .hud-item {
        background: rgba(0, 0, 0, 0.7);
        padding: 8px 12px;
        border-radius: 8px;
        margin-bottom: 10px;
        font-size: 14px;
        font-weight: 500;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      /* Mobile Controls */
      .mobile-controls {
        position: fixed;
        bottom: 20px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        padding: 0 20px;
        z-index: 1000;
        display: none;
      }
      
      .control-pad {
        background: rgba(0, 0, 0, 0.7);
        border-radius: 50%;
        width: 100px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      .control-buttons {
        display: flex;
        gap: 15px;
      }
      
      .control-btn {
        background: rgba(0, 0, 0, 0.7);
        border-radius: 50%;
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 24px;
        font-weight: bold;
        cursor: pointer;
      }
      
      /* Responsive design */
      @media (max-width: 768px) {
        .control-panel {
          top: 10px;
          right: 10px;
          left: 10px;
          max-width: none;
          min-width: unset;
        }
        
        #map {
          top: 10px;
          left: 10px;
          right: 10px;
          width: auto;
          height: 200px;
        }
        
        #info-panel {
          bottom: 10px;
          left: 10px;
          right: 10px;
          transform: none;
          min-width: unset;
          max-width: none;
          padding: 20px;
        }
        
        .hud {
          top: 10px;
          left: 10px;
        }
        
        .mobile-controls {
          display: flex;
        }
      }
      
      @media (max-width: 480px) {
        .control-panel {
          padding: 10px;
        }
        
        .panel-content {
          padding: 15px;
        }
        
        #info-panel {
          padding: 15px;
        }
        
        #info-panel h2 {
          font-size: 20px;
        }
        
        #info-panel p {
          font-size: 14px;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CaAqejqX.js"></script>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    
    <!-- Main Control Panel -->
    <div class="control-panel">
      <div class="panel-header">
        <h3>Settings</h3>
        <button class="panel-toggle" id="panel-toggle">▼</button>
      </div>
      
      <div class="settings-tabs">
        <button class="tab-button active" data-tab="audio">Audio</button>
        <button class="tab-button" data-tab="graphics">Graphics</button>
        <button class="tab-button" data-tab="controls">Controls</button>
      </div>
      
      <div class="panel-content" id="panel-content">
        <!-- Audio Tab -->
        <div class="tab-content active" id="audio-tab">
          <div class="control-item">
            <label for="audio-toggle">Audio</label>
            <button id="audio-toggle">On</button>
          </div>
          <div class="control-item">
            <label for="master-volume">Master Volume</label>
            <input type="range" id="master-volume" min="0" max="1" step="0.1" value="0.5">
          </div>
          <div class="control-item">
            <label for="sfx-volume">SFX Volume</label>
            <input type="range" id="sfx-volume" min="0" max="1" step="0.1" value="0.7">
          </div>
          <div class="control-item">
            <label for="bgm-volume">BGM Volume</label>
            <input type="range" id="bgm-volume" min="0" max="1" step="0.1" value="0.5">
          </div>
        </div>
        
        <!-- Graphics Tab -->
        <div class="tab-content" id="graphics-tab">
          <div class="control-item">
            <label for="quality">Quality</label>
            <select id="quality" class="control-select">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="control-item">
            <label for="renderer">Renderer</label>
            <select id="renderer" class="control-select">
              <option value="webgl">WebGL</option>
              <option value="webgpu">WebGPU</option>
            </select>
          </div>
          <div class="control-item">
            <label for="shadows">Shadows</label>
            <button id="shadows-toggle">On</button>
          </div>
          <div class="control-item">
            <label for="anti-aliasing">Anti-aliasing</label>
            <button id="aa-toggle">On</button>
          </div>
        </div>
        
        <!-- Controls Tab -->
        <div class="tab-content" id="controls-tab">
          <div class="control-item">
            <label>Keyboard Controls</label>
            <div style="font-size: 12px; color: #aaa; margin-top: 5px;">
              <p>W/↑ - Accelerate</p>
              <p>S/↓ - Brake</p>
              <p>A/← - Turn Left</p>
              <p>D/→ - Turn Right</p>
              <p>Shift - Boost</p>
              <p>Space - Jump</p>
              <p>Enter - Interact</p>
              <p>M - Map</p>
              <p>L - Mute</p>
            </div>
          </div>
          <div class="control-item">
            <label>Gamepad Support</label>
            <button id="gamepad-toggle">On</button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- HUD Elements -->
    <div class="hud">
      <div class="hud-item" id="speedometer">Speed: 0 km/h</div>
      <div class="hud-item" id="position">Position: (0, 0, 0)</div>
    </div>
    
    <!-- Mobile Controls -->
    <div class="mobile-controls">
      <div class="control-pad">
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 5px; width: 80px; height: 80px;">
          <div></div>
          <div class="control-btn" data-control="forward">↑</div>
          <div></div>
          <div class="control-btn" data-control="left">←</div>
          <div></div>
          <div class="control-btn" data-control="right">→</div>
          <div></div>
          <div class="control-btn" data-control="backward">↓</div>
          <div></div>
        </div>
      </div>
      <div class="control-buttons">
        <div class="control-btn" data-control="boost">B</div>
        <div class="control-btn" data-control="jump">A</div>
        <div class="control-btn" data-control="interact">X</div>
        <div class="control-btn" data-control="map">M</div>
      </div>
    </div>
    
  </body>
</html>
